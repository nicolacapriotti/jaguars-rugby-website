<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Junction City Jaguars Rugby</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* =========================
GLOBAL VARIABLES
========================= */

:root{
--jaguar-gold:#857040;
--black:#000;
--dark:#111;
--white:#ffffff;
}

/* =========================
GLOBAL STYLES
========================= */

body{
margin:0;
font-family:'Oswald', sans-serif;
background:var(--dark);
color:var(--white);
}

h1,h2,h3,h4{
font-family:'Gagalin', sans-serif;
letter-spacing:1px;
}

/* =========================
NAVBAR
========================= */

header{
position:sticky;
top:0;
width:100%;
background:var(--black);
z-index:1000;
border-bottom:3px solid var(--jaguar-gold);
}

.nav-container{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 40px;
max-width:1200px;
margin:auto;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-area img{
height:55px;
}

.logo-text{
font-size:20px;
font-weight:500;
color:var(--jaguar-gold);
}

nav ul{
display:flex;
list-style:none;
gap:30px;
margin:0;
padding:0;
}

nav a{
text-decoration:none;
color:var(--white);
font-size:16px;
transition:0.2s;
}

nav a:hover{
color:var(--jaguar-gold);
}

/* =========================
MOBILE MENU
========================= */

.hamburger{
display:none;
flex-direction:column;
cursor:pointer;
gap:5px;
}

.hamburger span{
width:25px;
height:3px;
background:var(--white);
}

@media (max-width:768px){

nav{
position:absolute;
top:70px;
left:0;
width:100%;
background:var(--black);
display:none;
}

nav ul{
flex-direction:column;
align-items:center;
padding:20px 0;
gap:20px;
}

nav.active{
display:block;
}

.hamburger{
display:flex;
}

}

/* =========================
HERO SECTION
========================= */

.hero{
height:90vh;
background-image:url('hero.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

.hero-content{
position:relative;
z-index:2;
max-width:900px;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero h2{
font-size:28px;
font-weight:400;
margin-bottom:40px;
color:var(--jaguar-gold);
}

.hero-buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.hero-btn{
padding:14px 28px;
font-size:18px;
border:none;
cursor:pointer;
text-decoration:none;
color:white;
background:var(--jaguar-gold);
transition:.2s;
}

.hero-btn:hover{
background:#a28a4f;
}

.hero-btn.secondary{
background:transparent;
border:2px solid var(--jaguar-gold);
}

.hero-btn.secondary:hover{
background:var(--jaguar-gold);
}

/* =========================
MOBILE HERO
========================= */

@media (max-width:768px){

.hero h1{
font-size:38px;
}

.hero h2{
font-size:20px;
}

}

</style>

</head>
<body>

<header>

<div class="nav-container">

<div class="logo-area">
<img src="logo.png" alt="Junction City Jaguars Rugby Logo">
<div class="logo-text">Junction City Jaguars Rugby</div>
</div>

<div class="hamburger" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

<nav id="navMenu">
<ul>

<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Schedule</a></li>
<li><a href="#">Join</a></li>
<li><a href="#">Sponsors</a></li>
<li><a href="#">Contact</a></li>

</ul>
</nav>

</div>

</header>

<!-- HERO SECTION -->

<section class="hero">

<div class="hero-content">

<h1>Junction City Jaguars Rugby</h1>

<h2>Two Programs. One Brotherhood.<br>
High School Team & Men's Club</h2>

<div class="hero-buttons">

<a class="hero-btn" href="#">High School Team</a>

<a class="hero-btn secondary" href="#">Men's Team</a>

</div>

</div>

</section>

<script>

function toggleMenu(){
document.getElementById("navMenu").classList.toggle("active");
}

</script>

</body>
</html>
