<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Junction City Jaguars Rugby</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Oswald', sans-serif;
background:#111;
color:white;
}

header{
position:sticky;
top:0;
width:100%;
background:#000;
z-index:1000;
border-bottom:3px solid #f2b705;
}

.nav-container{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 40px;
max-width:1200px;
margin:auto;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-area img{
height:55px;
}

.logo-text{
font-size:20px;
font-weight:500;
color:#f2b705;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
margin:0;
padding:0;
}

nav a{
text-decoration:none;
color:white;
font-size:16px;
transition:0.2s;
}

nav a:hover{
color:#f2b705;
}

.hamburger{
display:none;
flex-direction:column;
cursor:pointer;
gap:5px;
}

.hamburger span{
width:25px;
height:3px;
background:white;
}

@media (max-width:768px){

nav{
position:absolute;
top:70px;
left:0;
width:100%;
background:#000;
display:none;
}

nav ul{
flex-direction:column;
align-items:center;
padding:20px 0;
gap:20px;
}

nav.active{
display:block;
}

.hamburger{
display:flex;
}

}

</style>

</head>
<body>

<header>

<div class="nav-container">

<div class="logo-area">
<img src="logo.png">
<div class="logo-text">Junction City Jaguars Rugby</div>
</div>

<div class="hamburger" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

<nav id="navMenu">
<ul>

<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Schedule</a></li>
<li><a href="#">Join</a></li>
<li><a href="#">Sponsors</a></li>
<li><a href="#">Contact</a></li>

</ul>
</nav>

</div>

</header>

<script>

function toggleMenu(){
document.getElementById("navMenu").classList.toggle("active");
}

</script>

</body>
</html>
